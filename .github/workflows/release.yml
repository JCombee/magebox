name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Linux
          - goos: linux
            goarch: amd64
            suffix: ''
          - goos: linux
            goarch: arm64
            suffix: ''
          # macOS
          - goos: darwin
            goarch: amd64
            suffix: ''
          - goos: darwin
            goarch: arm64
            suffix: ''

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          BINARY_NAME=magebox-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}

          go build -ldflags="-s -w -X main.version=${VERSION}" \
            -o ${BINARY_NAME} \
            ./cmd/magebox

          # Create checksum
          sha256sum ${BINARY_NAME} > ${BINARY_NAME}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: magebox-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            magebox-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}
            magebox-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f -exec mv {} release/ \;
          ls -la release/

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          SEMVER="${VERSION#v}"

          # Extract changelog entry for this version from CHANGELOG.md
          # Captures everything between "## [X.Y.Z]" and the next "## [" heading
          CHANGELOG=$(awk "/^## \\[${SEMVER}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md)

          cat > release_notes.md <<NOTES
          ## What's New

          ${CHANGELOG}
          ---

          ## Installation

          **macOS (Apple Silicon):**
          \`\`\`bash
          curl -L https://github.com/qoliber/magebox/releases/download/${VERSION}/magebox-darwin-arm64 -o /usr/local/bin/magebox
          chmod +x /usr/local/bin/magebox
          \`\`\`

          **macOS (Intel):**
          \`\`\`bash
          curl -L https://github.com/qoliber/magebox/releases/download/${VERSION}/magebox-darwin-amd64 -o /usr/local/bin/magebox
          chmod +x /usr/local/bin/magebox
          \`\`\`

          **Linux (x86_64):**
          \`\`\`bash
          curl -L https://github.com/qoliber/magebox/releases/download/${VERSION}/magebox-linux-amd64 -o /usr/local/bin/magebox
          chmod +x /usr/local/bin/magebox
          \`\`\`

          **Linux (ARM64):**
          \`\`\`bash
          curl -L https://github.com/qoliber/magebox/releases/download/${VERSION}/magebox-linux-arm64 -o /usr/local/bin/magebox
          chmod +x /usr/local/bin/magebox
          \`\`\`

          ## Verify Installation
          \`\`\`bash
          magebox --version
          \`\`\`

          ## Update Existing Installation
          \`\`\`bash
          magebox self-update
          \`\`\`
          NOTES

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') || contains(github.ref, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  homebrew:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    if: "!contains(github.ref, '-beta') && !contains(github.ref, '-alpha') && !contains(github.ref, '-rc')"
    steps:
      - name: Get version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

      - name: Download release assets and calculate checksums
        id: checksums
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          BASE_URL="https://github.com/qoliber/magebox/releases/download/v${VERSION}"

          for platform in darwin-arm64 darwin-amd64 linux-arm64 linux-amd64; do
            echo "Downloading magebox-${platform}..."
            curl -fsSL --retry 3 --retry-delay 5 "${BASE_URL}/magebox-${platform}" -o "magebox-${platform}"
            CHECKSUM=$(sha256sum "magebox-${platform}" | awk '{print $1}')
            UPPER=$(echo "$platform" | tr '[:lower:]-' '[:upper:]_')
            echo "${UPPER}=${CHECKSUM}" >> $GITHUB_OUTPUT
            echo "  ${platform}: ${CHECKSUM}"
          done

      - name: Checkout homebrew-magebox
        uses: actions/checkout@v5
        with:
          repository: qoliber/homebrew-magebox
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formulae
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          SHA_DARWIN_ARM64=${{ steps.checksums.outputs.DARWIN_ARM64 }}
          SHA_DARWIN_AMD64=${{ steps.checksums.outputs.DARWIN_AMD64 }}
          SHA_LINUX_ARM64=${{ steps.checksums.outputs.LINUX_ARM64 }}
          SHA_LINUX_AMD64=${{ steps.checksums.outputs.LINUX_AMD64 }}

          # Class name for versioned formula: MageboxAT1120 for version 1.12.0
          CLASS_SUFFIX=$(echo "${VERSION}" | tr '.' '')
          VERSIONED_CLASS="MageboxAT${CLASS_SUFFIX}"

          # Helper to generate a formula body (takes class name as $1)
          generate_formula() {
            local CLASS_NAME="$1"
            cat <<FORMULA
          # typed: false
          # frozen_string_literal: true

          class ${CLASS_NAME} < Formula
            desc "Fast, native Magento development environment"
            homepage "https://magebox.dev"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/qoliber/magebox/releases/download/v#{version}/magebox-darwin-arm64"
                sha256 "${SHA_DARWIN_ARM64}"
              end
              on_intel do
                url "https://github.com/qoliber/magebox/releases/download/v#{version}/magebox-darwin-amd64"
                sha256 "${SHA_DARWIN_AMD64}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/qoliber/magebox/releases/download/v#{version}/magebox-linux-arm64"
                sha256 "${SHA_LINUX_ARM64}"
              end
              on_intel do
                url "https://github.com/qoliber/magebox/releases/download/v#{version}/magebox-linux-amd64"
                sha256 "${SHA_LINUX_AMD64}"
              end
            end

            def install
              suffix = if OS.mac?
                           Hardware::CPU.arm? ? "darwin-arm64" : "darwin-amd64"
                         else
                           Hardware::CPU.arm? ? "linux-arm64" : "linux-amd64"
                         end
              bin.install "magebox-#{suffix}" => "magebox"
            end

            test do
              assert_match "MageBox", shell_output("#{bin}/magebox --version")
            end
          end
          FORMULA
          }

          # Main formula (always latest)
          generate_formula "Magebox" > homebrew-tap/Formula/magebox.rb

          # Versioned formula (e.g. magebox@1.12.0.rb)
          generate_formula "${VERSIONED_CLASS}" > "homebrew-tap/Formula/magebox@${VERSION}.rb"

      - name: Commit and push
        run: |
          cd homebrew-tap
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add Formula/
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "Update magebox to v${{ steps.version.outputs.VERSION }}"
          git push
