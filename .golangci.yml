version: "2"

run:
  modules-download-mode: readonly

formatters:
  enable:
    - gofmt
    - goimports

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
  settings:
    errcheck:
      check-type-assertions: true
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - (*compress/gzip.Reader).Close
        - (*compress/gzip.Writer).Close
        - (net.Conn).Close
        - (*database/sql.DB).Close
        - (*database/sql.Rows).Close
        - (*net/http.Response).Body.Close
    staticcheck:
      checks:
        - "all"
        - "-QF*"
    misspell:
      locale: US
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
